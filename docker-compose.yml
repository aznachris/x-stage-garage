services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: stagex-garage:latest
    container_name: stagex-garage
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_TELEMETRY_DISABLED: "1"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: stagex-super-secret-key-2024-change-in-prod
      ADMIN_PASSWORD: stagex2024
    volumes:
      - stagex_data:/app/data
      - stagex_uploads:/app/public/uploads

  dev:
    image: node:22-alpine
    profiles: ["dev"]
    container_name: stagex-garage-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: stagex-super-secret-key-2024-change-in-prod
      ADMIN_PASSWORD: stagex2024
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - next_cache:/app/.next
      - stagex_data:/app/data
      - stagex_uploads:/app/public/uploads

volumes:
  stagex_data:
  stagex_uploads:
  node_modules:
  next_cache:
